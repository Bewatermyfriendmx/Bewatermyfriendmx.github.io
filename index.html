<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BE WATER</title>
    <style>
        /* Add your CSS here */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .header {
            background: #002D72;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .animation {
            animation: fadeIn 2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .impact-section, .books-section, .contact-form, .instagram-section, .footer {
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="BE WATER Logo">
        <h1>Welcome to BE WATER</h1>
    </div>
    <div class="impact-section animation">
        <h2>Our Impact</h2>
        <p>Details about our impact...</p>
    </div>
    <div class="books-section animation">
        <h2>Books</h2>
        <p>List of books...</p>
    </div>
    <div class="contact-form animation">
        <h2>Contact Us</h2>
        <form>
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </div>
    <div class="instagram-section animation">
        <h2>Follow Us on Instagram</h2>
        <p>@bewater</p>
    </div>
    <div class="footer animation">
        <p>&copy; 2026 BE WATER. All Rights Reserved.</p>
    </div>
</body>
</html>
